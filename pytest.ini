[pytest]

# Minimum Python version
minversion = 3.8

# Django settings (required for pytest-django)
DJANGO_SETTINGS_MODULE = learning_log.settings

# Where pytest should look for tests
testpaths =
    tests

# Test discovery patterns
python_files =
    tests.py
    test_*.py
    *_tests.py

python_classes = Test*
python_functions = test_*

# Markers for organizing tests
markers =
    e2e: End-to-end tests
    unit: Unit tests
    integration: Integration tests
    smoke: Critical functionality tests
    slow: Long-running tests
    login: Login-related tests
    auth: Authentication-required tests
    registration: User registration tests
    api: API tests

# Default pytest options
addopts =
    -v
    --tb=short
    --strict-markers
    --durations=10
    -ra

# Logging configuration
log_cli = false
log_cli_level = INFO

# Console output style
console_output_style = progress

# Needed for pytest-playwright / async tests
asyncio_mode = auto